<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteMaker</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hljs-theme">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>
    <script>
        // Tauri API script for v2
        (function() {
            console.log('Setting up Tauri API detection...');
            
            // Check if Tauri API is already available
            if (window.__TAURI__) {
                console.log('Tauri API found immediately');
                return;
            }
            
            console.log('Tauri API not found, waiting for injection...');
            
            // Poll for Tauri API
            let attempts = 0;
            const maxAttempts = 50; // 5 seconds
            
            const checkInterval = setInterval(() => {
                attempts++;
                
                if (window.__TAURI__) {
                    console.log('Tauri API detected after', attempts * 100, 'ms');
                    clearInterval(checkInterval);
                    
                    // Trigger app re-initialization if needed
                    if (window.noteMakerApp && window.noteMakerApp.needsTauriAPI) {
                        console.log('Re-initializing app with Tauri API');
                        window.noteMakerApp = new NoteMaker();
                    }
                    return;
                }
                
                if (attempts >= maxAttempts) {
                    console.warn('Tauri API never detected after', maxAttempts * 100, 'ms');
                    clearInterval(checkInterval);
                }
            }, 100);
        })();
    </script>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>📝 NoteMaker</h1>
            <div class="controls">
                <button id="new-note">New Note</button>
                <button id="new-folder">New Folder</button>
                <button id="save-note">Save</button>
                <input type="text" id="search" placeholder="Search notes...">
            </div>
        </header>
        
        <div class="content-row">
            <aside class="sidebar">
                <div class="browser-header">
                    <button id="nav-up" title="Go to parent directory">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                        Back
                    </button>
                    <div id="current-path" class="current-path"></div>
                    <button id="refresh-folders" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                </div>
                <div id="folders-list" class="browser-list"></div>
                <div id="backlinks-section" class="backlinks-section" style="display:none;">
                    <div class="backlinks-header">
                        <span class="backlinks-label">Backlinks</span>
                    </div>
                    <div id="backlinks-list" class="backlinks-list"></div>
                </div>
                <div id="tags-section" class="tags-filter-section" style="display:none;">
                    <div class="tags-filter-header">
                        <span class="tags-filter-label">Tags</span>
                        <button id="clear-tag-filter" class="clear-tag-btn" style="display:none;">Clear</button>
                    </div>
                    <div id="tags-filter-list" class="tags-filter-list"></div>
                </div>
                <div class="notes-section">
                    <div class="notes-header">
                        <h3>Notes</h3>
                        <span id="current-folder"></span>
                    </div>
                    <div id="notes-list"></div>
                </div>
            </aside>

            <main class="editor-container">
                <div class="editor-pane">
                    <div id="tag-bar" class="tag-bar">
                        <div id="tag-chips" class="tag-chips"></div>
                        <input type="text" id="tag-input" class="tag-input" placeholder="Add tag…" />
                    </div>
                    <textarea id="editor" placeholder="Start typing in markdown..."></textarea>
                </div>
                <div class="preview-pane">
                    <div id="preview"></div>
                    <div id="outline-panel" class="outline-panel" style="display:none;">
                        <div class="outline-title">Outline</div>
                        <div id="outline-list" class="outline-list"></div>
                    </div>
                </div>
            </main>
        </div>
        
        <footer class="status-bar">
            <div class="status-left">
                <div class="status-item">
                    <span>Words: <span id="word-count">0</span></span>
                </div>
                <div class="status-item">
                    <span>Characters: <span id="char-count">0</span></span>
                </div>
            </div>
            <div class="status-right">
                <div class="save-status saved" id="save-status">
                    <span>●</span>
                    <span id="save-text">Saved</span>
                </div>
            </div>
        </footer>
    </div>
    
    <script src="app.js?v=2"></script>
    <script>
        // Suppress native context menu globally so custom menus work in WKWebView
        document.addEventListener('contextmenu', function(e) {
            // Allow native context menu only in the editor textarea
            if (e.target.id === 'editor') return;
            e.preventDefault();
        }, true);
    </script>
</body>
</html>
